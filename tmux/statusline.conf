# vim: ft=tmux
# Neon Dark palette (matches Ghostty)
#   bg base:   #0D1116   sub bg:    #1a1f26
#   dim fg:    #5a6577   fg:        #a0a8b8
#   accent 1:  #37f499 (neon green)
#   accent 2:  #987afb (neon violet)
#   accent 3:  #04d1f9 (neon cyan)

# copy-mode selection (clearly visible against #0D1116)
set -g mode-style "fg=#ffffff,bg=#3b4354"

set -g message-style "fg=#a0a8b8,bg=#1a1f26"
set -g message-command-style "fg=#a0a8b8,bg=#1a1f26"

set -g pane-border-style "fg=#1a1f26"
set -g pane-active-border-style "fg=#37f499"

# pane number display (prefix q)
set -g display-panes-active-colour "#04d1f9"
set -g display-panes-colour "#5a6577"

# clock (prefix t)
setw -g clock-mode-colour "#37f499"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#5a6577,bg=#0D1116"

set -g status-bg "#0D1116"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#0D1116,bg=#37f499,bold] #S:#I.#P #[fg=#37f499,bg=#5a6577,nobold,nounderscore,noitalics]#[fg=#0D1116,bg=#5a6577,bold] #(whoami) #[fg=#5a6577,bg=#0D1116]"
set -g status-right "#[fg=#5a6577,bg=#0D1116,nobold,nounderscore,noitalics]#[fg=#a0a8b8,bg=#5a6577]#[fg=#0D1116,bg=#5a6577,bold] #h "

setw -g window-status-activity-style "underscore,fg=#a0a8b8,bg=#0D1116"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a0a8b8,bg=#0D1116"
setw -g window-status-format '#[fg=#0D1116,bg=#0D1116]#[default] #I  #{b:pane_current_path} #[fg=#0D1116,bg=#0D1116,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#0D1116,bg=#987afb]#[fg=#0D1116,bg=#987afb,bold] #I  #{b:pane_current_path} #[fg=#987afb,bg=#0D1116,nobold]'

# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Run opencode in a separate session (one per project path)
bind o run-shell '\
  SESSION="opencode-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "$HOME/.config/bin/opencode"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
